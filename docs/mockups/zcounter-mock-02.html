<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>zCounter Mock — 案2 Provider Sections</title>
  <style>
    :root {
      --bg: #f5f5f7;
      --surface: #ffffff;
      --text: #1d1d1f;
      --text-secondary: #6e6e73;
      --border: rgba(0, 0, 0, 0.06);
      --shadow: 0 12px 40px rgba(0, 0, 0, 0.12), 0 0 0 0.5px rgba(0, 0, 0, 0.08);
      --safe: #34c759;
      --warning: #ff9500;
      --critical: #ff3b30;
      --codex-accent: #10a37f;
      --cursor-accent: #6b4fbb;
      --popover-w: 352px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 48px 16px;
      background: linear-gradient(160deg, #e8e8ed 0%, #d1d1d6 100%);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }
    .popover {
      width: var(--popover-w);
      background: var(--bg);
      border-radius: 12px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .variant-label {
      padding: 8px 14px 0;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--text-secondary);
    }
    .header {
      padding: 10px 16px 14px;
      border-bottom: 1px solid var(--border);
    }
    .header h1 { font-size: 15px; font-weight: 600; }
    .header p { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
    .content { padding: 12px; display: flex; flex-direction: column; gap: 14px; }
    .section {
      background: var(--surface);
      border-radius: 12px;
      border: 1px solid var(--border);
      overflow: hidden;
    }
    .section-head {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      background: #fafafa;
    }
    .section-icon {
      width: 22px;
      height: 22px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
    }
    .section-icon.codex { background: var(--codex-accent); }
    .section-icon.cursor { background: var(--cursor-accent); }
    .section-title { font-size: 13px; font-weight: 600; flex: 1; }
    .section-count {
      font-size: 11px;
      color: var(--text-secondary);
      background: #eee;
      padding: 2px 7px;
      border-radius: 10px;
    }
    .account-row {
      padding: 12px 14px;
    }
    .account-row + .account-row {
      border-top: 1px solid var(--border);
    }
    .row-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 10px;
    }
    .row-head .name { font-size: 14px; font-weight: 600; }
    .row-head .plan { font-size: 11px; color: var(--text-secondary); }
    .usage-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px 14px;
    }
    .usage-item label {
      display: block;
      font-size: 10px;
      color: var(--text-secondary);
      margin-bottom: 3px;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .usage-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .usage-row .pct {
      font-size: 13px;
      font-weight: 600;
      width: 36px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }
    .usage-row .pct.safe { color: var(--safe); }
    .usage-row .pct.warning { color: var(--warning); }
    .usage-row .pct.critical { color: var(--critical); }
    .bar-track {
      flex: 1;
      height: 6px;
      background: #ebebed;
      border-radius: 3px;
      overflow: hidden;
    }
    .bar-track span {
      display: block;
      height: 100%;
      border-radius: 3px;
    }
    .bar-track .safe { background: var(--safe); }
    .bar-track .warning { background: var(--warning); }
    .bar-track .critical { background: var(--critical); }
    .row-foot {
      margin-top: 8px;
      font-size: 11px;
      color: var(--text-secondary);
    }
    .footer {
      display: flex;
      border-top: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.6);
    }
    .footer button {
      flex: 1;
      padding: 11px;
      border: none;
      background: transparent;
      font-size: 13px;
      color: #007aff;
      cursor: pointer;
      font-family: inherit;
    }
    .footer button:hover { background: rgba(0, 0, 0, 0.04); }
    .footer button + button { border-left: 1px solid var(--border); }
  </style>
</head>
<body>
  <div class="popover" role="dialog" aria-label="zCounter">
    <p class="variant-label">案2 — Provider Sections</p>
    <header class="header">
      <h1>zCounter</h1>
      <p>3 accounts · 2 providers</p>
    </header>

    <div class="content">
      <section class="section" aria-labelledby="codex-heading">
        <div class="section-head">
          <span class="section-icon codex" aria-hidden="true">Cx</span>
          <span class="section-title" id="codex-heading">Codex</span>
          <span class="section-count">2 accounts</span>
        </div>

        <div class="account-row">
          <div class="row-head">
            <span class="name">zurgxx</span>
            <span class="plan">Plus</span>
          </div>
          <div class="usage-grid">
            <div class="usage-item">
              <label>5H</label>
              <div class="usage-row">
                <div class="bar-track"><span class="safe" style="width:99%"></span></div>
                <span class="pct safe">99%</span>
              </div>
            </div>
            <div class="usage-item">
              <label>Weekly</label>
              <div class="usage-row">
                <div class="bar-track"><span class="critical" style="width:2%"></span></div>
                <span class="pct critical">2%</span>
              </div>
            </div>
          </div>
          <p class="row-foot">Reset 19:10</p>
        </div>

        <div class="account-row">
          <div class="row-head">
            <span class="name">rock</span>
            <span class="plan">Plus</span>
          </div>
          <div class="usage-grid">
            <div class="usage-item">
              <label>5H</label>
              <div class="usage-row">
                <div class="bar-track"><span class="safe" style="width:54%"></span></div>
                <span class="pct safe">54%</span>
              </div>
            </div>
            <div class="usage-item">
              <label>Weekly</label>
              <div class="usage-row">
                <div class="bar-track"><span class="safe" style="width:93%"></span></div>
                <span class="pct safe">93%</span>
              </div>
            </div>
          </div>
          <p class="row-foot">Reset 2026/6/1 9:54</p>
        </div>
      </section>

      <section class="section" aria-labelledby="cursor-heading">
        <div class="section-head">
          <span class="section-icon cursor" aria-hidden="true">Cu</span>
          <span class="section-title" id="cursor-heading">Cursor</span>
          <span class="section-count">1 account</span>
        </div>

        <div class="account-row">
          <div class="row-head">
            <span class="name">rock</span>
            <span class="plan">Cursor Pro</span>
          </div>
          <div class="usage-grid">
            <div class="usage-item">
              <label>Total</label>
              <div class="usage-row">
                <div class="bar-track"><span class="safe" style="width:99%"></span></div>
                <span class="pct safe">99%</span>
              </div>
            </div>
            <div class="usage-item">
              <label>Auto</label>
              <div class="usage-row">
                <div class="bar-track"><span class="safe" style="width:99%"></span></div>
                <span class="pct safe">99%</span>
              </div>
            </div>
          </div>
          <p class="row-foot">Reset 2026/6/28 9:36</p>
        </div>
      </section>
    </div>

    <footer class="footer">
      <button type="button">Settings</button>
      <button type="button">Refresh</button>
    </footer>
  </div>
</body>
</html>
